map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

server {
  listen 3000;
  root /usr/share/nginx/html;
  index index.html;
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $backend_uri "${BACKEND_URI}";

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  location = /health {
    proxy_intercept_errors on;
    error_page 500 502 503 504 = /health-upstream-unavailable;
    proxy_pass $backend_uri;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-FOSScalidraw-Frontend-Status "ok";
    add_header X-FOSScalidraw-Frontend-Status "ok" always;
    add_header Cache-Control "no-store" always;
  }

  location = /health-upstream-unavailable {
    internal;
    default_type application/json;
    add_header X-FOSScalidraw-Frontend-Status "ok" always;
    add_header Cache-Control "no-store" always;
    return 503 '{"status":"unhealthy","service":"frontend","checks":{"frontend":{"status":"ok"},"backend":{"status":"unhealthy","error":"Backend is not reachable from the frontend container. Check BACKEND_URI and backend container health."}}}';
  }

  # Stale service worker cleanup — prevent index.html fallback for SW files
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location ~ ^/workbox-.*\.js$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Content-Type "application/javascript; charset=utf-8" always;
    return 200 'self.addEventListener("install",()=>self.skipWaiting());self.addEventListener("activate",()=>{self.registration.unregister().then(()=>self.clients.matchAll({type:"window"})).then(c=>c.forEach(d=>d.navigate(d.url)))});';
  }

  # Never cache index.html — prevents stale SPA shell on new deployments
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass $backend_uri;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  location /auth/ {
    proxy_pass $backend_uri;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header Cookie $http_cookie;
  }

  location /ws/ {
    proxy_pass $backend_uri;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_read_timeout 86400;
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
}
