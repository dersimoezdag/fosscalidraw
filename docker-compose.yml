services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: fosscalidraw
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-fosscalidraw}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-change-me-local-mongo-password}
    healthcheck:
      test: ["CMD-SHELL", "mongosh --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file: .env
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-3001}
      MONGODB_URI: ${MONGODB_URI:-mongodb://${MONGO_ROOT_USERNAME:-fosscalidraw}:${MONGO_ROOT_PASSWORD:-change-me-local-mongo-password}@mongo:27017/fosscalidraw?authSource=admin}
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URI: http://backend:${BACKEND_PORT:-3001}
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  mongo_data:
